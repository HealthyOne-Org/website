<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get HealthyOne</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: #333;
        }
        .card {
            background: white; border-radius: 20px; padding: 2.5rem;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card p { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #e0e0e0;
            border-top-color: #4CAF50; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .store-links { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
        .store-links a {
            display: block; padding: 0.9rem 1.5rem; border-radius: 12px;
            text-decoration: none; color: white; font-weight: 600; font-size: 1rem;
        }
        .apple { background: #000; }
        .google { background: #4CAF50; }
    </style>

</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1>Taking you to HealthyOne</h1>
        <p>Redirecting to the app store...</p>
        <noscript>
            <div class="store-links">
                <a href="https://apps.apple.com/app/id6757052428" class="apple">Download on the App Store</a>
                <a href="https://play.google.com/store/apps/details?id=com.hardawaylabs.healthyone" class="google">Get it on Google Play</a>
            </div>
        </noscript>
    </div>
    <script>
        (function() {
            // Capture the click event with source info
            var params = new URLSearchParams(window.location.search);
            var source = params.get('src') || 'tiktok';
            var campaign = params.get('c') || 'bio_link';

            posthog.capture('link_click', {
                source: source,
                campaign: campaign,
                referrer: document.referrer || 'direct'
            });

            // Detect platform and redirect
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isAndroid = /android/i.test(ua);
            var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

            var appleUrl = 'https://apps.apple.com/app/id6757052428';
            var googleUrl = 'https://play.google.com/store/apps/details?id=com.hardawaylabs.healthyone';

            var destination = isAndroid ? googleUrl : appleUrl;

            // Small delay so PostHog event fires before redirect
            setTimeout(function() {
                window.location.href = destination;
            }, 800);
        })();
    </script>
</body>
</html>
